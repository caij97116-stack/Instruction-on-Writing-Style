<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文风指令生成器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>文风指令生成器</h1>
      <p class="subtitle">快速生成结构化的写作风格指令，可用于 AI 提示词或内容创作指南</p>
    </header>

    <div class="main-layout">
      <!-- 左侧：输入区 -->
      <section class="panel input-panel">
        <h2>配置参数</h2>

        <div class="form-group">
          <label for="styleName">风格名称 <span class="required">*</span></label>
          <input type="text" id="styleName" placeholder="例如：温暖治愈风、学术严谨风、小红书种草风" maxlength="50">
        </div>

        <div class="form-group">
          <label for="tone">语气基调</label>
          <div class="select-wrapper">
            <select id="tone">
              <option value="">-- 请选择 --</option>
              <option value="正式严谨">正式严谨</option>
              <option value="轻松活泼">轻松活泼</option>
              <option value="温暖治愈">温暖治愈</option>
              <option value="犀利幽默">犀利幽默</option>
              <option value="冷静理性">冷静理性</option>
              <option value="激情澎湃">激情澎湃</option>
              <option value="文艺清新">文艺清新</option>
              <option value="朴实真诚">朴实真诚</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="audience">目标受众</label>
          <input type="text" id="audience" placeholder="例如：大学生、职场新人、宝妈群体" maxlength="50">
        </div>

        <div class="form-group">
          <label for="contentType">内容类型</label>
          <div class="select-wrapper">
            <select id="contentType">
              <option value="">-- 请选择 --</option>
              <option value="自媒体文章">自媒体文章</option>
              <option value="学术论文">学术论文</option>
              <option value="产品文案">产品文案</option>
              <option value="社交媒体帖子">社交媒体帖子</option>
              <option value="小说创作">小说创作</option>
              <option value="商业报告">商业报告</option>
              <option value="演讲稿">演讲稿</option>
              <option value="教程/指南">教程/指南</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="characteristics">关键特征</label>
          <textarea id="characteristics" rows="3" placeholder="例如：多用短句、善用比喻、第一人称视角、大量使用emoji"></textarea>
        </div>

        <div class="form-group">
          <label for="reference">参考范例</label>
          <textarea id="reference" rows="3" placeholder="粘贴一段你喜欢的文字作为风格参考..."></textarea>
        </div>

        <div class="form-group">
          <label for="avoid">避免事项</label>
          <textarea id="avoid" rows="2" placeholder="例如：避免使用长难句、避免过于口语化、避免使用专业术语"></textarea>
        </div>

        <button id="generateBtn" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5,3 19,12 5,21 5,3"/>
          </svg>
          生成指令
        </button>
      </section>

      <!-- 右侧：输出区 -->
      <section class="panel output-panel">
        <div class="output-header">
          <h2>生成的文风指令</h2>
          <div class="output-actions">
            <button id="copyBtn" class="btn-icon" title="复制">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
            <button id="downloadBtn" class="btn-icon" title="下载">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7,10 12,15 17,10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="outputContent" class="output-content">
          <div class="placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14,2 14,8 20,8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10,9 9,9 8,9"/>
            </svg>
            <p>在左侧填写参数后点击「生成指令」</p>
          </div>
        </div>
      </section>
    </div>

    <!-- 作家文风库 -->
    <section class="authors-section">
      <div class="authors-header">
        <h2>作家文风库</h2>
        <div class="authors-toolbar">
          <div class="search-wrapper">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="authorSearch" placeholder="搜索作家名、风格特点、年代...">
          </div>
          <div class="select-wrapper">
            <select id="authorRegion">
              <option value="all">全部地区</option>
              <option value="中国">中国作家</option>
              <option value="日本">日本作家</option>
              <option value="国际">国际作家</option>
            </select>
          </div>
          <span class="author-count">共 <strong id="authorCount">0</strong> 位</span>
        </div>
      </div>
      <div class="authors-grid" id="authorGrid"></div>
    </section>

    <!-- 预设模板 -->
    <section class="presets-section">
      <h2>快速模板</h2>
      <div class="presets-grid" id="presetsGrid">
        <div class="preset-card" data-preset="xiaohongshu">
          <h3>小红书种草风</h3>
          <p>活泼亲切、emoji丰富、突出体验感</p>
        </div>
        <div class="preset-card" data-preset="academic">
          <h3>学术论文风</h3>
          <p>严谨客观、逻辑清晰、引用规范</p>
        </div>
        <div class="preset-card" data-preset="storytelling">
          <h3>故事叙述风</h3>
          <p>画面感强、情感真挚、节奏起伏</p>
        </div>
        <div class="preset-card" data-preset="marketing">
          <h3>营销文案风</h3>
          <p>抓住痛点、突出卖点、号召行动</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
