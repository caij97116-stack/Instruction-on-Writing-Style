<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文风指令生成器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <h1>文风指令生成器</h1>
        <p class="subtitle">浏览 109 位作家/平台/影视风格，一键生成写作指令</p>
      </div>
      <button id="apiToggleBtn" class="api-toggle-btn" title="API 配置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </header>

    <!-- API 配置面板（隐藏） -->
    <section id="apiPanel" class="api-panel collapsed">
      <div class="api-panel-inner">
        <div class="api-row">
          <div class="form-group api-flex">
            <label for="apiUrl">API 地址</label>
            <input type="text" id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions">
          </div>
          <div class="form-group api-flex">
            <label for="apiKey">API Key</label>
            <div class="api-key-row">
              <input type="password" id="apiKey" placeholder="sk-...">
              <button id="toggleKeyBtn" class="btn-sm" title="显示/隐藏">👁</button>
            </div>
          </div>
        </div>
        <div class="api-row">
          <div class="form-group api-flex">
            <label for="modelSelect">模型</label>
            <div class="model-row">
              <select id="modelSelect"><option value="">手动输入或点击拉取</option></select>
              <input type="text" id="modelInput" placeholder="gpt-4o / claude-3.5-sonnet / deepseek-chat" class="model-input">
            </div>
          </div>
          <div class="form-group api-preset">
            <label for="presetSelect">已保存预设</label>
            <div class="preset-row">
              <select id="presetSelect"><option value="">-- 选择预设 --</option></select>
              <button id="deletePresetBtn" class="btn-sm btn-danger" title="删除预设">🗑</button>
            </div>
          </div>
        </div>
        <div class="api-actions">
          <button id="fetchModelsBtn" class="btn-outline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            拉取模型
          </button>
          <button id="testApiBtn" class="btn-outline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>
            测试连接
          </button>
          <button id="savePresetBtn" class="btn-outline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            保存预设
          </button>
        </div>
        <div id="apiStatus" class="api-status"></div>
      </div>
    </section>

    <!-- 主布局 -->
    <div class="main-layout">
      <!-- 左侧：作家列表 -->
      <section class="panel list-panel">
        <div class="list-toolbar">
          <div class="search-wrapper">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="搜索作家、风格、年代...">
          </div>
        </div>
        <div class="list-filters">
          <div class="select-wrapper select-sm">
            <select id="regionFilter">
              <option value="all">全部分类</option>
              <option value="中国文学">中国文学</option>
              <option value="日本文学">日本文学</option>
              <option value="欧美文学">欧美文学</option>
              <option value="拉美文学">拉美文学</option>
              <option value="亚洲文学">亚洲文学</option>
              <option value="非洲文学">非洲文学</option>
              <option value="平台文风">平台文风</option>
              <option value="影视动漫">影视动漫</option>
            </select>
          </div>
          <div class="select-wrapper select-sm">
            <select id="eraFilter">
              <option value="all">全部年代</option>
              <option value="17世纪">17世纪</option>
              <option value="19世纪">19世纪</option>
              <option value="近代">近代</option>
              <option value="现代">现代</option>
              <option value="20世纪">20世纪</option>
              <option value="当代">当代</option>
              <option value="互联网时代">互联网时代</option>
            </select>
          </div>
          <div class="select-wrapper select-sm">
            <select id="categoryFilter">
              <option value="all">全部类型</option>
              <option value="中国文学">文学作家</option>
              <option value="平台文风">平台文风</option>
              <option value="影视动漫">影视动漫</option>
            </select>
          </div>
        </div>
        <div id="authorList" class="author-list"></div>
      </section>

      <!-- 右侧：详情 / 指令输出 -->
      <section class="panel detail-panel">
        <div class="detail-header-row">
          <h2>作家详情</h2>
          <div class="output-actions">
            <button id="aiGenerateBtn" class="btn-ai" title="用 AI 分析当前文风并生成指令">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
              </svg>
              AI 生成指令
            </button>
            <button id="copyDetailBtn" class="btn-icon" title="复制指令">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
            <button id="downloadDetailBtn" class="btn-icon" title="下载">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="authorDetail" class="detail-content">
          <div class="empty-state">
            <div class="empty-icon">📖</div>
            <p>请从左侧列表选择一位作家</p>
          </div>
        </div>
        <div id="aiOutput" class="ai-output" style="display:none;">
          <div class="ai-output-header">
            <h3>AI 分析结果</h3>
            <div class="output-actions">
              <button id="copyAiBtn" class="btn-icon" title="复制">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
              <button id="downloadAiBtn" class="btn-icon" title="下载">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="aiOutputContent" class="ai-output-content"></div>
          <div class="ai-cmd-bar">
            <label class="cmd-label">指令</label>
            <input type="text" id="cmdInput" placeholder="输入关键词：打包 / 打包成酒馆格式文风指令 / 清空底层" autocomplete="off">
            <button id="cmdPackBtn" class="btn-sm btn-pack" title="打包为 TXT">打包</button>
            <button id="cmdTavernBtn" class="btn-sm btn-tavern" title="打包为酒馆格式">酒馆格式</button>
          </div>
        </div>
      </section>
    </div>

    <!-- 快速模板 -->
    <section class="presets-section">
      <h2>快速模板</h2>
      <div class="presets-grid" id="presetsGrid">
        <div class="preset-card" data-preset="xiaohongshu">
          <h3>小红书种草风</h3>
          <p>活泼亲切、emoji丰富、突出体验感</p>
        </div>
        <div class="preset-card" data-preset="academic">
          <h3>学术论文风</h3>
          <p>严谨客观、逻辑清晰、引用规范</p>
        </div>
        <div class="preset-card" data-preset="storytelling">
          <h3>故事叙述风</h3>
          <p>画面感强、情感真挚、节奏起伏</p>
        </div>
        <div class="preset-card" data-preset="marketing">
          <h3>营销文案风</h3>
          <p>抓住痛点、突出卖点、号召行动</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
